<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nimbus — 更聪明的团队待办</title>
  <style>
    :root { --brand: #4f46e5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; color: #1f2937; line-height: 1.6; }
    header { background: linear-gradient(135deg, var(--brand), #7c3aed); color: #fff; padding: 96px 24px; text-align: center; }
    header h1 { font-size: 44px; margin-bottom: 16px; }
    header p { font-size: 20px; opacity: .92; }
    .cta { display: inline-block; margin-top: 28px; background: #fff; color: var(--brand); padding: 14px 32px; border-radius: 999px; font-weight: 600; text-decoration: none; }
    .features { max-width: 960px; margin: 72px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .card { padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; }
    .card h3 { color: var(--brand); margin-bottom: 8px; }
    footer { text-align: center; padding: 40px; color: #9ca3af; }
  </style>
</head>
<body>
  <header>
    <h1>Nimbus</h1>
    <p>把团队的待办、进度和会议纪要收进一处，AI 帮你排优先级。</p>
    <a class="cta" href="#">免费试用</a>
  </header>
  <section class="features">
    <div class="card"><h3>智能排序</h3><p>根据截止日期和依赖关系自动排列今天最该做的事。</p></div>
    <div class="card"><h3>一处协作</h3><p>评论、附件、纪要都挂在任务下，不再来回翻聊天记录。</p></div>
    <div class="card"><h3>每周回顾</h3><p>自动生成团队周报，谁做了什么一目了然。</p></div>
  </section>
  <footer>© 2026 Nimbus Labs</footer>
</body>
</html>
